name: Deploy docs
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'
      - '.github/workflows/vitepress-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    uses: KooshaPari/phenoShared/.github/workflows/vitepress-pages.yml@d95bb6755390f73c56ea496b246d098fbf97bbe9
    with:
      concurrency_group: pages-phenoshared
      docs_dir: docs
