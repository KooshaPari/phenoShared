name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      crate:
        description: 'Specific crate to publish (empty = all publishable)'
        required: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CRATE: ${{ inputs.crate }}
        run: |
          if [ -n "$CRATE" ]; then
            cargo publish -p "$CRATE" --no-verify
          else
            # Publish in topological order with retries for index propagation
            for name in \
              phenotype-domain \
              phenotype-port-interfaces \
              phenotype-event-sourcing \
              phenotype-state-machine \
              phenotype-policy-engine \
              phenotype-cache-adapter \
              ffi_utils \
              phenotype-nanovms-client \
              phenotype-http-adapter \
              phenotype-postgres-adapter \
              phenotype-redis-adapter \
              phenotype-application; do
              echo "Publishing $name"
              
              # Retry up to 3 times with backoff for index propagation
              attempt=1
              max_attempts=3
              while [ $attempt -le $max_attempts ]; do
                if output=$(cargo publish -p "$name" --no-verify 2>&1); then
                  echo "  ✓ $name published successfully"
                  break
                elif echo "$output" | grep -q "crate version .* is already uploaded"; then
                  echo "  ⊘ $name already published, skipping"
                  break
                elif [ $attempt -lt $max_attempts ]; then
                  echo "  ⚠ Attempt $attempt failed, retrying in $((2 * attempt))s..."
                  sleep $((2 * attempt))
                  attempt=$((attempt + 1))
                else
                  echo "  ✗ Failed to publish $name after $max_attempts attempts"
                  echo "$output"
                  exit 1
                fi
              done
            done
          fi
